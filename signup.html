<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Yashveer483/phishscan-ai/refs/heads/main/Project%20Zero%20Trust.png">
    <title>Sign Up — Cyber Defense Hub</title>

    <!-- Firebase v8 compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0edf7;
        }

        .card {
            width: 900px;
            min-height: 560px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            background: #f4f4f4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ── LEFT PANEL ── */
        .left {
            width: 55%;
            padding: 30px 36px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .navbar h2 { color: #5a0ca3; font-weight: bold; font-size: 18px; }
        .navbar ul { display: flex; list-style: none; gap: 20px; }
        .navbar ul li a {
            text-decoration: none; color: #555; font-size: 13px;
            transition: color 0.2s;
        }
        .navbar ul li a:hover { color: #5a0ca3; font-weight: bold; }

        h1 { text-align: center; color: #5a0ca3; margin-bottom: 18px; font-size: 26px; }

        .field-label {
            font-size: 13px; color: #444;
            margin-bottom: 4px; margin-top: 10px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 16px;
            border-radius: 30px;
            border: 2px solid #ccc;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #5a0ca3; }

        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #5a0ca3;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 18px;
            transition: background 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: #7b1fd1; }
        .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

        .switch-link {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #555;
        }
        .switch-link a { color: #5a0ca3; text-decoration: none; font-weight: 600; }
        .switch-link a:hover { text-decoration: underline; }

        /* ── MESSAGES ── */
        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .msg.error   { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
        .msg.success { background: #e8f8f0; color: #1a7a4a; border: 1px solid #b7e4c7; }
        .msg.show    { display: block; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RIGHT PANEL ── */
        .right {
            width: 45%;
            background:
                linear-gradient(rgba(90,12,163,0.65), rgba(142,45,226,0.65)),
                url('https://github.com/Yashveer483/phishscan-ai/blob/main/Project%20Zero%20Trust.png?raw=true');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            color: #fff;
            text-align: center;
        }
        .right h3 { font-size: 22px; margin-bottom: 10px; }
        .right p  { font-size: 14px; opacity: 0.85; line-height: 1.7; }
        .shield-icon { font-size: 52px; margin-bottom: 18px; }
        .feature-list { list-style: none; margin-top: 18px; text-align: left; }
        .feature-list li {
            font-size: 13px; opacity: 0.9;
            padding: 5px 0; display: flex; align-items: center; gap: 8px;
        }
        .feature-list li::before {
            content: '✓';
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- LEFT -->
    <div class="left">
        <div class="navbar">
            <h2>Zero Trust</h2>
            <ul>
                <li><a href="cyber-defense-hub.html">HOME</a></li>
                <li><a href="cyber-defense-hub.html#about">ABOUT US</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </div>

        <h1>Create Account</h1>

        <div id="msg-box" class="msg"></div>

        <form id="signupForm" autocomplete="off">

            <div class="row">
                <div>
                    <div class="field-label">First Name</div>
                    <input type="text" id="firstName" placeholder="👤  First name" required/>
                </div>
                <div>
                    <div class="field-label">Last Name</div>
                    <input type="text" id="lastName" placeholder="👤  Last name" required/>
                </div>
            </div>

            <div class="field-label">Email Address</div>
            <input type="email" id="email" placeholder="✉️  Your email" required/>

            <div class="field-label">Password</div>
            <input type="password" id="password" placeholder="🔒  Create password (min 6 chars)" required/>

            <div class="field-label">Confirm Password</div>
            <input type="password" id="confirmPassword" placeholder="🔒  Confirm password" required/>

            <button type="submit" class="submit-btn" id="signupBtn">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Create Account</span>
            </button>

        </form>

        <div class="switch-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right"></div>

</div>

<script>
    
const firebaseConfig = {
  apiKey: "AIzaSyBrGyAJk_98OKHD6I9siyEKUsawhQ1j5TM",
  authDomain: "project-zero-trust-fb5eb.firebaseapp.com",
  projectId: "project-zero-trust-fb5eb",
  storageBucket: "project-zero-trust-fb5eb.firebasestorage.app",
  messagingSenderId: "1069009618491",
  appId: "1:1069009618491:web:8190b6bef35b282e7f3e1e",
  measurementId: "G-0ZGZ909TPW"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── UI helpers ──
const msgBox  = document.getElementById('msg-box');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');
const signupBtn = document.getElementById('signupBtn');

function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = `msg ${type} show`;
}

function setLoading(on) {
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent   = on ? 'Creating account...' : 'Create Account';
    signupBtn.disabled    = on;
}

// ── Form submit ──
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName       = document.getElementById('firstName').value.trim();
    const lastName        = document.getElementById('lastName').value.trim();
    const email           = document.getElementById('email').value.trim();
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    // Client-side validation
    if (!firstName || !lastName) {
        return showMsg('Please enter your first and last name.', 'error');
    }
    if (password.length < 6) {
        return showMsg('Password must be at least 6 characters.', 'error');
    }
    if (password !== confirmPassword) {
        return showMsg('Passwords do not match.', 'error');
    }

    setLoading(true);

    try {
        // Step 1: Create user in Firebase Auth
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Step 2: Update display name
        await user.updateProfile({
            displayName: `${firstName} ${lastName}`
        });

        // Step 3: Save extra user data in Firestore
        await db.collection('users').doc(user.uid).set({
            firstName:   firstName,
            lastName:    lastName,
            email:       email,
            displayName: `${firstName} ${lastName}`,
            createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
            role:        'user'
        });

        showMsg('Account created successfully! Redirecting...', 'success');

        // Redirect after 1.5 seconds
        setTimeout(() => {
            window.location.href = '/index.html';
        }, 1500);

    } catch (error) {
        setLoading(false);

        // Show friendly error messages
        const errors = {
            'auth/email-already-in-use':    'This email is already registered. Try logging in.',
            'auth/invalid-email':           'Please enter a valid email address.',
            'auth/weak-password':           'Password is too weak. Use at least 6 characters.',
            'auth/network-request-failed':  'Network error. Check your connection and try again.'
        };
        showMsg(errors[error.code] || `Error: ${error.message}`, 'error');
    }
});
</script>
</body>
</html>
